# ============================================================================
# Deploy static site to GitHub Pages
# ----------------------------------------------------------------------------
# Runs on every push to `main`. Uploads the repo (which contains index.html at
# the root) as a Pages artifact and deploys it. No build step needed — the site
# is pure static HTML/CSS/JS.
#
# One-time setup: Repo → Settings → Pages → Source = "GitHub Actions".
# ============================================================================
name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  # Allow manually triggering from the Actions tab
  workflow_dispatch:

# Minimal permissions required to deploy to Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; don't cancel an in-progress run
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Publish the whole repo root (index.html lives here)
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
